<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Refurb Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --bg2: #F5F0E8;
    --terracotta: #C4704F;
    --terracotta-dark: #A85C3D;
    --sage: #7D9B76;
    --text: #2C2C2C;
    --muted: #6B6B6B;
    --border: #E0D8CF;
    --white: #FFFFFF;
    --shadow: rgba(44,44,44,0.08);
    --shadow-md: rgba(44,44,44,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  h1, h2, h3, .card-title { font-family: 'Playfair Display', serif; }

  /* HEADER */
  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-brand h1 { font-size: 1.25rem; color: var(--terracotta); letter-spacing: -0.01em; }
  .header-brand .brand-icon { font-size: 1.4rem; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* BUTTONS */
  .btn { font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 6px; line-height: 1; }
  .btn-primary { background: var(--terracotta); color: var(--white); }
  .btn-primary:hover { background: var(--terracotta-dark); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg2); color: var(--text); }

  /* LAYOUT */
  .app-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar { width: 240px; min-width: 240px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 600; }
  .room-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .room-item { padding: 10px 16px; cursor: pointer; font-size: 0.9rem; color: var(--muted); border-left: 3px solid transparent; transition: all 0.15s ease; display: flex; align-items: center; gap: 8px; user-select: none; }
  .room-item:hover { background: var(--bg2); color: var(--text); }
  .room-item.active { background: #FDF0EB; color: var(--terracotta); border-left-color: var(--terracotta); font-weight: 600; }
  .room-icon { font-size: 1rem; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn-add-room { width: 100%; justify-content: center; background: transparent; color: var(--terracotta); border: 1.5px dashed var(--terracotta); font-size: 0.85rem; padding: 9px 12px; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s ease; display: flex; align-items: center; gap: 6px; }
  .btn-add-room:hover { background: #FDF0EB; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .room-header { padding: 24px 28px 0; }
  .room-header h2 { font-size: 1.6rem; color: var(--text); margin-bottom: 16px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); padding: 0 28px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500; padding: 10px 16px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.15s ease; border-radius: 6px 6px 0 0; }
  .tab:hover { color: var(--text); background: var(--bg2); }
  .tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); background: transparent; }

  /* GRID */
  .grid-area { padding: 24px 28px; flex: 1; }
  .grid-toolbar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

  /* EMPTY STATE */
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 0.875rem; margin-bottom: 20px; max-width: 280px; margin-left: auto; margin-right: auto; line-height: 1.6; }

  /* CARD */
  .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px var(--shadow); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s ease, transform 0.2s ease; }
  .card:hover { box-shadow: 0 6px 20px var(--shadow-md); transform: translateY(-2px); }
  .card-image-wrap { position: relative; width: 100%; padding-top: 66.66%; background: var(--bg2); overflow: hidden; }
  .card-image-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .card-image-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--border); gap: 6px; font-size: 0.75rem; }
  .card-image-placeholder svg { width: 36px; height: 36px; opacity: 0.5; }
  .colour-bar { height: 4px; width: 100%; }
  .card-body { padding: 12px 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.3; word-break: break-word; }
  .card-notes { font-size: 0.8rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
  .card-added-by { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; opacity: 0.75; }
  .react-group.own-item { opacity: 0.45; cursor: not-allowed; }
  .react-group.own-item .react-btn { cursor: not-allowed; }

  /* CARD FOOTER — REACTIONS */
  .card-footer { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--bg2); gap: 4px; }
  .react-group { display: flex; gap: 3px; }
  .react-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 3px; font-size: 0.78rem; color: var(--muted); padding: 4px 6px; border-radius: 6px; transition: all 0.15s ease; font-family: 'Inter', sans-serif; font-weight: 500; line-height: 1; }
  .react-btn:hover { background: var(--bg2); }
  .react-btn.active-love { background: #FEE8E8; color: #C0392B; }
  .react-btn.active-like { background: #E8F4FD; color: #2980B9; }
  .react-btn.active-dislike { background: #F0F0F0; color: #555; }
  .react-btn .emoji { font-size: 1rem; }
  .card-actions { display: flex; gap: 2px; }
  .comment-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: var(--muted); transition: all 0.15s ease; font-size: 0.78rem; display: flex; align-items: center; gap: 3px; font-family: 'Inter', sans-serif; }
  .comment-btn:hover { background: var(--bg2); color: var(--sage); }
  .comment-btn.has-comments { color: var(--sage); }
  .delete-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: var(--muted); transition: all 0.15s ease; display: flex; align-items: center; }
  .delete-btn:hover { background: #FEF0F0; color: #D04040; }

  /* MODAL BASE */
  .modal-overlay { position: fixed; inset: 0; background: rgba(44,44,44,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(44,44,44,0.25); transform: translateY(16px) scale(0.98); transition: transform 0.2s ease; }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 1.15rem; color: var(--text); }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--muted); padding: 4px 8px; border-radius: 6px; line-height: 1; transition: all 0.15s; }
  .modal-close:hover { background: var(--bg2); color: var(--text); }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group textarea { font-family: 'Inter', sans-serif; font-size: 0.9rem; color: var(--text); background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; width: 100%; transition: border-color 0.15s ease; outline: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--terracotta); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .colour-picker-row { display: flex; align-items: center; gap: 10px; }
  .colour-picker-row input[type="color"] { width: 44px; height: 36px; padding: 2px; border-radius: 8px; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); }
  .colour-label { font-size: 0.85rem; color: var(--muted); }

  /* IMAGE PREVIEW */
  .image-preview { border-radius: 10px; overflow: hidden; background: var(--bg2); display: none; }
  .image-preview.visible { display: block; }
  .image-preview img { width: 100%; max-height: 180px; object-fit: cover; display: block; }
  .image-preview-error { padding: 16px; text-align: center; font-size: 0.8rem; color: var(--muted); }

  /* GOOGLE DRIVE */
  .gdrive-btn { font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s ease; }
  .gdrive-btn:hover { background: var(--bg2); }
  .gdrive-btn.signed-in { border-color: var(--sage); color: var(--sage); }
  .upload-divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.78rem; }
  .upload-divider::before, .upload-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s ease; background: var(--bg); }
  .upload-area:hover { border-color: var(--terracotta); background: #FDF8F6; }
  .upload-area.uploading { opacity: 0.6; pointer-events: none; }
  .upload-area p { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
  .upload-status { font-size: 0.82rem; padding: 8px 12px; border-radius: 8px; display: none; }
  .upload-status.success { background: #EBF5EB; color: #3A7A3A; display: block; }
  .upload-status.error { background: #FDECEC; color: #A03030; display: block; }
  .upload-status.loading { background: var(--bg2); color: var(--muted); display: block; }

  /* COMMENTS MODAL */
  .comments-list { display: flex; flex-direction: column; gap: 10px; max-height: 260px; overflow-y: auto; }
  .comment-item { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
  .comment-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .comment-text { font-size: 0.88rem; color: var(--text); line-height: 1.4; }
  .comment-reaction { font-size: 0.72rem; margin-top: 4px; }
  .no-comments { text-align: center; padding: 24px; color: var(--muted); font-size: 0.85rem; }
  .comment-input-row { display: flex; gap: 8px; }
  .comment-input-row input { flex: 1; font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; background: var(--bg); }
  .comment-input-row input:focus { border-color: var(--terracotta); }
  .comment-input-row button { flex-shrink: 0; }

  /* TOAST */
  .sync-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2C2C2C; color: #fff; font-size: 0.82rem; padding: 10px 18px; border-radius: 20px; z-index: 999; transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; white-space: nowrap; pointer-events: none; }
  .sync-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* MOBILE */
  @media (max-width: 680px) {
    .app-body { flex-direction: column; height: auto; overflow: visible; }
    .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: none; overflow: visible; }
    .room-list { display: flex; flex-direction: row; overflow-x: auto; padding: 8px; gap: 6px; flex-wrap: nowrap; scrollbar-width: none; }
    .room-list::-webkit-scrollbar { display: none; }
    .room-item { white-space: nowrap; border-left: none; border-radius: 20px; padding: 7px 14px; font-size: 0.82rem; }
    .room-item.active { background: #FDF0EB; border-radius: 20px; }
    .sidebar-header { display: none; }
    .sidebar-footer { display: none; }
    .mobile-add-room { display: block !important; }
    .main { overflow-y: visible; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .room-header { padding: 16px 16px 0; }
    .grid-area { padding: 16px; }
    .tabs { padding: 0 16px; }
    header { padding: 0 12px; }
    .header-brand h1 { font-size: 0.95rem; }
    .header-actions { gap: 4px; }
    .btn { font-size: 0.78rem; padding: 6px 10px; }
    .gdrive-btn { font-size: 0.78rem; padding: 6px 10px; }
  }

  .mobile-add-room { display: none; padding: 4px 8px 8px; }
  .mobile-add-room button { font-size: 0.78rem; padding: 6px 14px; border-radius: 16px; background: transparent; border: 1.5px dashed var(--terracotta); color: var(--terracotta); cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; white-space: nowrap; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #C0B8AF; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="brand-icon">🏡</span>
    <h1>Home Refurb Planner</h1>
  </div>
  <div class="header-actions">
    <button class="gdrive-btn" id="gSignInBtn" onclick="handleGoogleSignIn()">
      <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="gSignInLabel">Sign in</span>
    </button>
    <button class="btn btn-ghost" id="syncBtn" onclick="syncFromDrive()" style="display:none">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Sync
    </button>
    <button class="btn btn-ghost" onclick="exportSummary()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button class="btn btn-ghost" id="saveDriveBtn" onclick="exportToDrive()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 87.3 78" fill="none"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H10.9c0 1.55.4 3.1 1.2 4.5z" fill="#0066DA"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.35C.4 49.75 0 51.3 0 52.85h27.45z" fill="#00AC47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75L86.1 57.2c.8-1.4 1.2-2.95 1.2-4.5H59.85L73.55 76.8z" fill="#EA4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.85 0H34.45c-1.65 0-3.2.45-4.55 1.2z" fill="#00832D"/><path d="M59.85 52.85H87.3c0-1.55-.4-3.1-1.2-4.5L73.65 25.5 59.85 52.85z" fill="#2684FC"/><path d="M43.65 25L27.45 52.85H59.85z" fill="#00AC47"/></svg>
      Save to Drive
    </button>
    <button class="btn btn-ghost" id="analysisBtn" onclick="exportAnalysis()" style="display:none">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      AI Analysis
    </button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Rooms</h2></div>
    <div class="room-list" id="roomList"></div>
    <div class="mobile-add-room"><button onclick="addRoom()">+ Add Room</button></div>
    <div class="sidebar-footer">
      <button class="btn-add-room" onclick="addRoom()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Room
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="room-header"><h2 id="currentRoomName">Select a room</h2></div>
    <div class="tabs" id="tabsBar"></div>
    <div class="grid-area">
      <div class="grid-toolbar">
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Inspiration
        </button>
      </div>
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </main>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Inspiration</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="driveUploadSection">
        <div class="upload-area" id="uploadArea" onclick="triggerFileUpload()">
          <svg width="28" height="28" fill="none" stroke="var(--terracotta)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p id="uploadAreaLabel">Upload image to Google Drive</p>
          <p style="font-size:0.75rem;margin-top:2px;color:var(--border)">Sign in first, then click to choose a file</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadToDrive(this)">
        <div class="upload-status" id="uploadStatus"></div>
      </div>
      <div class="upload-divider">or paste a URL</div>
      <div class="form-group">
        <label for="inputImageUrl">Image URL</label>
        <input type="url" id="inputImageUrl" placeholder="https://..." autocomplete="off" oninput="schedulePreview()" onblur="doPreview()">
      </div>
      <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="" alt="Preview">
        <div class="image-preview-error" id="previewError" style="display:none">Could not load image. The URL may not allow hotlinking.</div>
      </div>
      <div class="form-group">
        <label for="inputTitle">Title</label>
        <input type="text" id="inputTitle" placeholder="e.g. Velvet sofa in sage green" maxlength="80">
      </div>
      <div class="form-group">
        <label for="inputNotes">Notes</label>
        <textarea id="inputNotes" placeholder="Add any notes, links, or sizes..."></textarea>
      </div>
      <div class="form-group">
        <label>Colour Tag</label>
        <div class="colour-picker-row">
          <input type="color" id="inputColour" value="#C4704F">
          <span class="colour-label">Pick an accent colour for this card</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- COMMENTS MODAL -->
<div class="modal-overlay" id="commentsOverlay" onclick="handleCommentsOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="commentsTitle">Comments</h3>
      <button class="modal-close" onclick="closeComments()">✕</button>
    </div>
    <div class="modal-body">
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-row">
        <input type="text" id="commentInput" placeholder="Add your thoughts…" maxlength="200" onkeydown="if(event.key==='Enter')submitComment()">
        <button class="btn btn-primary" onclick="submitComment()">Post</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="sync-toast" id="syncToast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const CATEGORIES = ['Colour Schemes', 'Materials', 'Furniture', 'Fittings', 'Other'];
const DEFAULT_ROOMS = [
  { id: 'r-living',   name: 'Living Room', isDefault: true },
  { id: 'r-kitchen',  name: 'Kitchen',     isDefault: true },
  { id: 'r-bedroom',  name: 'Bedroom',     isDefault: true },
  { id: 'r-bathroom', name: 'Bathroom',    isDefault: true },
  { id: 'r-hallway',  name: 'Hallway',     isDefault: true },
];
const ROOM_ICONS = { 'Living Room':'🛋️','Kitchen':'🍳','Bedroom':'🛏️','Bathroom':'🚿','Hallway':'🚪' };
const LS_ROOMS     = 'homeRefurbPlanner_rooms';
const LS_ITEMS     = 'homeRefurbPlanner_items';
const LS_REACTIONS = 'homeRefurbPlanner_reactions'; // this device: { itemId: 'love'|'like'|'dislike' }
const LS_COMMENTS  = 'homeRefurbPlanner_comments';  // merged from all devices

// ── STATE ──────────────────────────────────────────────────
let state = {
  rooms: [], items: [], reactions: {}, comments: [],
  activeRoomId: null, activeCategory: CATEGORIES[0],
};
let activeCommentItemId = null;

// ── STORAGE ────────────────────────────────────────────────
function loadData() {
  const rooms = JSON.parse(localStorage.getItem(LS_ROOMS) || 'null');
  state.rooms = (rooms && rooms.length) ? rooms : DEFAULT_ROOMS.map(r => ({ ...r }));
  if (!rooms) saveRooms();
  state.items     = JSON.parse(localStorage.getItem(LS_ITEMS)     || '[]');
  state.reactions = JSON.parse(localStorage.getItem(LS_REACTIONS) || '{}');
  state.comments  = JSON.parse(localStorage.getItem(LS_COMMENTS)  || '[]');
}
function saveRooms()     { localStorage.setItem(LS_ROOMS,     JSON.stringify(state.rooms));     }
function saveItems()     { localStorage.setItem(LS_ITEMS,     JSON.stringify(state.items));     }
function saveReactions() { localStorage.setItem(LS_REACTIONS, JSON.stringify(state.reactions)); }
function saveComments()  { localStorage.setItem(LS_COMMENTS,  JSON.stringify(state.comments));  }

// ── UTILITIES ──────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function getRoomIcon(name) { return ROOM_ICONS[name] || '🏠'; }
function getRoomName(id) { return (state.rooms.find(r => r.id === id) || {}).name || ''; }
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── RENDER SIDEBAR ─────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  state.rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item' + (room.id === state.activeRoomId ? ' active' : '');
    div.innerHTML = `<span class="room-icon">${getRoomIcon(room.name)}</span>${escHtml(room.name)}`;
    div.addEventListener('click', () => selectRoom(room.id));
    list.appendChild(div);
  });
}

// ── RENDER TABS ────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === state.activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => selectCategory(cat));
    bar.appendChild(btn);
  });
}

// ── RENDER CARDS ───────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  const filtered = state.items.filter(i => i.roomId === state.activeRoomId && i.category === state.activeCategory);

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div><h3>No inspiration yet</h3><p>Add ideas for <strong>${escHtml(state.activeCategory)}</strong> in this room.</p><button class="btn btn-primary" onclick="openAddModal()">Add Inspiration</button></div>`;
    return;
  }

  // Sort: score = love*2 + like - dislike, then by most total reactions
  filtered.sort((a, b) => reactionScore(b) - reactionScore(a));

  filtered.forEach(item => {
    const myReaction = state.reactions[item.id] || null;
    const r = item.reactionCounts || { love: 0, like: 0, dislike: 0 };
    const itemComments = state.comments.filter(c => c.itemId === item.id);
    const isOwn = item.addedByDeviceId === DEVICE_ID;
    const reactDisabled = isOwn ? 'disabled title="You added this — reactions are for others to vote"' : '';
    const reactClass = isOwn ? ' own-item' : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;

    const imageHtml = item.imageUrl
      ? `<img src="${escHtml(item.imageUrl)}" alt="${escHtml(item.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = item.imageUrl ? 'style="display:none"' : '';
    const addedByLabel = item.addedBy
      ? `<div class="card-added-by">${isOwn ? '✏️ Added by you' : `👤 ${escHtml(item.addedBy)}`}</div>`
      : '';

    card.innerHTML = `
      <div class="card-image-wrap">
        ${imageHtml}
        <div class="card-image-placeholder" ${placeholderStyle}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>No image</span>
        </div>
      </div>
      <div class="colour-bar" style="background:${escHtml(item.colour || '#C4704F')}"></div>
      <div class="card-body">
        ${addedByLabel}
        <div class="card-title">${escHtml(item.title || 'Untitled')}</div>
        ${item.notes ? `<div class="card-notes">${escHtml(item.notes)}</div>` : ''}
      </div>
      <div class="card-footer">
        <div class="react-group${reactClass}">
          <button class="react-btn ${myReaction==='love'?'active-love':''}" onclick="toggleReaction('${item.id}','love')" title="Love it" ${reactDisabled}>
            <span class="emoji">❤️</span><span>${r.love||0}</span>
          </button>
          <button class="react-btn ${myReaction==='like'?'active-like':''}" onclick="toggleReaction('${item.id}','like')" title="Like it" ${reactDisabled}>
            <span class="emoji">👍</span><span>${r.like||0}</span>
          </button>
          <button class="react-btn ${myReaction==='dislike'?'active-dislike':''}" onclick="toggleReaction('${item.id}','dislike')" title="Not for me" ${reactDisabled}>
            <span class="emoji">👎</span><span>${r.dislike||0}</span>
          </button>
        </div>
        <div class="card-actions">
          <button class="comment-btn ${itemComments.length?'has-comments':''}" onclick="openComments('${item.id}')" title="Comments">
            💬 <span>${itemComments.length||''}</span>
          </button>
          <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Delete">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function reactionScore(item) {
  const r = item.reactionCounts || {};
  return (r.love||0)*2 + (r.like||0) - (r.dislike||0);
}

function render() {
  renderSidebar(); renderTabs(); renderCards();
  const room = state.rooms.find(r => r.id === state.activeRoomId);
  document.getElementById('currentRoomName').textContent = room ? room.name : 'Select a room';
}

// ── ACTIONS ────────────────────────────────────────────────
function selectRoom(id)   { state.activeRoomId = id;   render(); }
function selectCategory(c){ state.activeCategory = c;  render(); }

function addRoom() {
  const name = prompt('Enter room name:');
  if (!name || !name.trim()) return;
  const room = { id: uid(), name: name.trim(), isDefault: false };
  state.rooms.push(room);
  saveRooms();
  selectRoom(room.id);
}

function toggleReaction(itemId, type) {
  const current = state.reactions[itemId] || null;
  const item = state.items.find(i => i.id === itemId);
  if (!item) return;
  if (!item.reactionCounts) item.reactionCounts = { love: 0, like: 0, dislike: 0 };

  // Remove previous reaction from counts
  if (current) item.reactionCounts[current] = Math.max(0, (item.reactionCounts[current]||0) - 1);

  if (current === type) {
    // Toggle off
    delete state.reactions[itemId];
  } else {
    // Set new reaction
    state.reactions[itemId] = type;
    item.reactionCounts[type] = (item.reactionCounts[type]||0) + 1;
  }

  saveReactions();
  saveItems();
  renderCards();
  saveToDriveDebounced();
}

function deleteItem(itemId) {
  if (!confirm('Delete this inspiration card?')) return;
  state.items = state.items.filter(i => i.id !== itemId);
  state.comments = state.comments.filter(c => c.itemId !== itemId);
  delete state.reactions[itemId];
  saveItems(); saveReactions(); saveComments();
  renderCards();
}

// ── ADD ITEM MODAL ─────────────────────────────────────────
function openAddModal() {
  if (!state.activeRoomId) { alert('Please select a room first.'); return; }
  document.getElementById('inputImageUrl').value = '';
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputNotes').value = '';
  document.getElementById('inputColour').value = '#C4704F';
  document.getElementById('imagePreview').classList.remove('visible');
  document.getElementById('previewImg').src = '';
  document.getElementById('previewError').style.display = 'none';
  document.getElementById('uploadStatus').className = 'upload-status';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputTitle').focus(), 100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

let previewTimer = null;
function schedulePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(doPreview, 600); }
function doPreview() {
  clearTimeout(previewTimer);
  const url = document.getElementById('inputImageUrl').value.trim();
  const preview = document.getElementById('imagePreview');
  const img = document.getElementById('previewImg');
  const err = document.getElementById('previewError');
  if (!url) { preview.classList.remove('visible'); img.src = ''; return; }
  err.style.display = 'none'; img.style.display = 'block'; preview.classList.add('visible');
  img.onload  = () => { img.style.display = 'block'; err.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none';  err.style.display = 'block'; };
  img.src = url;
}

function saveItem() {
  const imageUrl = document.getElementById('inputImageUrl').value.trim();
  const title    = document.getElementById('inputTitle').value.trim();
  const notes    = document.getElementById('inputNotes').value.trim();
  const colour   = document.getElementById('inputColour').value;
  if (!title) {
    document.getElementById('inputTitle').focus();
    document.getElementById('inputTitle').style.borderColor = '#D04040';
    setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 2000);
    return;
  }
  const addedBy = localStorage.getItem('refurb_user_name') || promptUserName();
  state.items.push({ id: uid(), roomId: state.activeRoomId, category: state.activeCategory, imageUrl, title, notes, colour, reactionCounts: { love:0, like:0, dislike:0 }, createdAt: Date.now(), addedBy, addedByDeviceId: DEVICE_ID });
  saveItems(); closeModal(); renderCards();
}

// ── COMMENTS ───────────────────────────────────────────────
function openComments(itemId) {
  activeCommentItemId = itemId;
  const item = state.items.find(i => i.id === itemId);
  document.getElementById('commentsTitle').textContent = item ? `💬 ${item.title || 'Comments'}` : 'Comments';
  renderCommentsList();
  document.getElementById('commentsOverlay').classList.add('open');
  setTimeout(() => document.getElementById('commentInput').focus(), 100);
}

function closeComments() {
  document.getElementById('commentsOverlay').classList.remove('open');
  activeCommentItemId = null;
}

function handleCommentsOverlayClick(e) { if (e.target === document.getElementById('commentsOverlay')) closeComments(); }

function renderCommentsList() {
  const list = document.getElementById('commentsList');
  const comments = state.comments.filter(c => c.itemId === activeCommentItemId).sort((a,b) => a.createdAt - b.createdAt);
  if (!comments.length) {
    list.innerHTML = '<div class="no-comments">No comments yet — be the first!</div>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const date = new Date(c.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    const reactionLabel = c.reaction ? ({ love:'❤️ Love it', like:'👍 Like it', dislike:'👎 Not for me' }[c.reaction] || '') : '';
    return `<div class="comment-item">
      <div class="comment-meta">${escHtml(c.name || 'Family member')} · ${date}</div>
      <div class="comment-text">${escHtml(c.text)}</div>
      ${reactionLabel ? `<div class="comment-reaction">${reactionLabel}</div>` : ''}
    </div>`;
  }).join('');
}

function submitComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text || !activeCommentItemId) return;
  const comment = {
    id: uid(),
    itemId: activeCommentItemId,
    text,
    reaction: state.reactions[activeCommentItemId] || null,
    name: localStorage.getItem('refurb_user_name') || promptUserName(),
    deviceId: DEVICE_ID,
    createdAt: Date.now(),
  };
  state.comments.push(comment);
  saveComments();
  input.value = '';
  renderCommentsList();
  renderCards();
  saveToDriveDebounced();
}

function promptUserName() {
  const name = prompt('What\'s your name? (shown on comments)') || 'Family member';
  localStorage.setItem('refurb_user_name', name);
  return name;
}

// ── EXPORT SUMMARY (browser) ───────────────────────────────
function buildExportHtml() {
  let sectionsHtml = '';
  state.rooms.forEach(room => {
    let roomHtml = '';
    CATEGORIES.forEach(cat => {
      const catItems = state.items.filter(i => i.roomId === room.id && i.category === cat).sort((a,b) => reactionScore(b) - reactionScore(a));
      if (!catItems.length) return;
      const cardsHtml = catItems.map(item => {
        const r = item.reactionCounts || {};
        const imgHtml = item.imageUrl ? `<img src="${escHtml(item.imageUrl)}" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:block;margin-bottom:10px" onerror="this.style.display='none'">` : '';
        const notesHtml = item.notes ? `<p style="font-size:0.8rem;color:#6B6B6B;margin:4px 0 0;line-height:1.5">${escHtml(item.notes)}</p>` : '';
        const itemComments = state.comments.filter(c => c.itemId === item.id);
        const commentsHtml = itemComments.length ? `<div style="margin-top:8px;border-top:1px solid #E0D8CF;padding-top:8px">${itemComments.map(c=>`<div style="font-size:0.75rem;color:#555;margin-bottom:4px"><strong>${escHtml(c.name||'Family')}</strong>: ${escHtml(c.text)}</div>`).join('')}</div>` : '';
        return `<div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(44,44,44,0.08);break-inside:avoid">
          <div style="border-top:4px solid ${escHtml(item.colour||'#C4704F')}"></div>
          <div style="padding:12px 14px">
            ${imgHtml}
            <div style="font-family:'Playfair Display',serif;font-weight:600;font-size:0.95rem">${escHtml(item.title||'Untitled')}</div>
            ${notesHtml}
            <div style="margin-top:8px;font-size:0.82rem;color:#6B6B6B">❤️ ${r.love||0} &nbsp; 👍 ${r.like||0} &nbsp; 👎 ${r.dislike||0}</div>
            ${commentsHtml}
          </div>
        </div>`;
      }).join('');
      roomHtml += `<div style="margin-bottom:24px"><h3 style="font-family:'Inter',sans-serif;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:#6B6B6B;margin:0 0 12px;font-weight:600">${escHtml(cat)}</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">${cardsHtml}</div></div>`;
    });
    if (!roomHtml) return;
    sectionsHtml += `<section style="margin-bottom:40px"><h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#C4704F;border-bottom:2px solid #E0D8CF;padding-bottom:10px;margin:0 0 20px">${escHtml(room.name)}</h2>${roomHtml}</section>`;
  });
  if (!sectionsHtml) sectionsHtml = '<p style="color:#6B6B6B;font-style:italic">No inspiration items saved yet.</p>';
  const date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Home Refurb Summary</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>body{font-family:'Inter',sans-serif;background:#FAF8F5;color:#2C2C2C;margin:0;padding:0}.page{max-width:960px;margin:0 auto;padding:40px 32px}@media print{body{background:#fff}.no-print{display:none}}</style></head><body><div class="page"><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid #E0D8CF"><div><h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:#C4704F;margin:0 0 6px">Home Refurb Inspiration</h1><p style="color:#6B6B6B;margin:0;font-size:0.9rem">Exported ${escHtml(date)}</p></div><button class="no-print" onclick="window.print()" style="font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;padding:9px 18px;border-radius:8px;border:none;background:#C4704F;color:#fff;cursor:pointer">Print / Save PDF</button></div>${sectionsHtml}</div></body></html>`;
}

function exportSummary() {
  const win = window.open('', '_blank');
  if (win) { win.document.write(buildExportHtml()); win.document.close(); }
  else alert('Pop-up blocked. Please allow pop-ups and try again.');
}

// ── BUILD ANALYSIS JSON ────────────────────────────────────
function buildAnalysisData() {
  return {
    exportedAt: new Date().toISOString(),
    appUrl: window.location.href,
    totalItems: state.items.length,
    totalComments: state.comments.length,
    rooms: state.rooms.map(room => ({
      id: room.id,
      name: room.name,
      categories: CATEGORIES.map(cat => {
        const catItems = state.items
          .filter(i => i.roomId === room.id && i.category === cat)
          .sort((a,b) => reactionScore(b) - reactionScore(a))
          .map(item => ({
            id: item.id,
            title: item.title,
            notes: item.notes || null,
            imageUrl: item.imageUrl || null,
            colour: item.colour || null,
            category: cat,
            room: room.name,
            reactions: item.reactionCounts || { love:0, like:0, dislike:0 },
            score: reactionScore(item),
            comments: state.comments
              .filter(c => c.itemId === item.id)
              .map(c => ({ name: c.name || 'Family member', text: c.text, reaction: c.reaction, date: new Date(c.createdAt).toISOString() })),
            addedAt: new Date(item.createdAt || 0).toISOString(),
          }));
        return { category: cat, itemCount: catItems.length, items: catItems };
      }).filter(c => c.itemCount > 0),
    })),
    aiPromptHint: "Analyse this home refurbishment planning data. For each room identify: (1) top-voted items and why the family likes them based on comments, (2) items with mixed reactions that need discussion, (3) colour and style themes emerging across rooms, (4) any items where image content and comments conflict. Where imageUrl is provided, consider the visual content in your analysis.",
  };
}

// ── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeComments(); } });

// ── INIT ──────────────────────────────────────────────────
loadData();
if (state.rooms.length > 0) state.activeRoomId = state.rooms[0].id;
render();
</script>

<script>

const GDRIVE_CLIENT_ID = '403538152707-cpk3r4ucju9pq28d96a2p0nqfvl778jl.apps.googleusercontent.com';
const GDRIVE_FOLDER_ID = '1HaqD9eilBeilQtvNa3ALY70yn7siYOHy';
const GDRIVE_OWNER     = 'cachafpm@gmail.com';
const GDRIVE_SCOPE     = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';

const DEVICE_ID = (() => {
  let id = localStorage.getItem('refurb_device_id');
  if (!id) { id = 'dev-' + Math.random().toString(36).slice(2,10); localStorage.setItem('refurb_device_id', id); }

const DATA_FILENAME = `refurb-data-${DEVICE_ID}.json`;

let gAccessToken = null, gTokenClient = null, pendingFile = null;

// ── AUTH ───────────────────────────────────────────────────
function initGoogleAuth() {
  if (!window.google) return;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { setUploadStatus('error', 'Sign-in failed: ' + resp.error); return; }
      gAccessToken = resp.access_token;
      updateSignInUI(true);
      await syncFromDrive();
      await saveDataToDrive();
      if (pendingFile) { doUpload(pendingFile); pendingFile = null; }
    },
  });
}

window.addEventListener('load', () => setTimeout(initGoogleAuth, 500));

function updateSignInUI(on) {
  document.getElementById('gSignInBtn').classList.toggle('signed-in', on);
  document.getElementById('gSignInLabel').textContent = on ? 'Drive connected ✓' : 'Sign in';
  document.getElementById('uploadArea').querySelector('p').textContent = on ? 'Click to choose an image file' : 'Upload image to Google Drive';
  ['syncBtn','saveDriveBtn','analysisBtn'].forEach(id => document.getElementById(id).style.display = on ? '' : 'none');
}

function handleGoogleSignIn() {
  if (gAccessToken) {
    google.accounts.oauth2.revoke(gAccessToken, () => {});
    gAccessToken = null; updateSignInUI(false); return;
  }
  if (!gTokenClient) initGoogleAuth();
  if (!gTokenClient) { alert('Google Sign-In not ready — please try again.'); return; }
  gTokenClient.requestAccessToken({ prompt: 'consent' });
}

// ── TOAST ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('syncToast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── SAVE DEVICE DATA TO DRIVE ──────────────────────────────
async function saveDataToDrive() {
  if (!gAccessToken) return;
  const payload = JSON.stringify({
    deviceId: DEVICE_ID,
    userName: localStorage.getItem('refurb_user_name') || 'Family member',
    reactions: state.reactions,
    comments: state.comments.filter(c => c.deviceId === DEVICE_ID),
    savedAt: Date.now(),
  });
  const existingId = localStorage.getItem('refurb_drive_data_id');
  try {
    if (existingId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: payload,
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: DATA_FILENAME, parents: [GDRIVE_FOLDER_ID] })], { type: 'application/json' }));
      form.append('file', new Blob([payload], { type: 'application/json' }));
      const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST', headers: { Authorization: 'Bearer ' + gAccessToken }, body: form,
      });
      const data = await resp.json();
      localStorage.setItem('refurb_drive_data_id', data.id);
      await drivePermission(data.id, { role: 'reader', type: 'anyone' });
      await drivePermission(data.id, { role: 'writer', type: 'user', emailAddress: GDRIVE_OWNER }, '?sendNotificationEmail=false');
    }
  } catch(e) { console.warn('saveDataToDrive failed:', e); }
}

function saveToDriveDebounced() {
  clearTimeout(driveDebounceTimer);
  driveDebounceTimer = setTimeout(saveDataToDrive, 2000);
}

// ── SYNC FROM DRIVE ────────────────────────────────────────
async function syncFromDrive() {
  if (!gAccessToken) return;
  showToast('⏳ Syncing from Drive…');
  try {
    const q = encodeURIComponent(`'${GDRIVE_FOLDER_ID}' in parents and name contains 'refurb-data' and trashed=false`);
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
      headers: { Authorization: 'Bearer ' + gAccessToken },
    });
    const { files = [] } = await resp.json();

    const allData = (await Promise.all(files.map(async f => {
      try { return await (await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, { headers: { Authorization: 'Bearer ' + gAccessToken } })).json(); }
      catch { return null; }
    }))).filter(Boolean);

    // Merge reactions: tally per item across all devices
    const reactionTotals = {}; // itemId → { love, like, dislike }
    allData.forEach(d => {
      if (!d.reactions) return;
      Object.entries(d.reactions).forEach(([itemId, type]) => {
        if (!reactionTotals[itemId]) reactionTotals[itemId] = { love:0, like:0, dislike:0 };
        if (type) reactionTotals[itemId][type] = (reactionTotals[itemId][type]||0) + 1;
      });
    });
    state.items.forEach(item => { item.reactionCounts = reactionTotals[item.id] || { love:0, like:0, dislike:0 }; });

    // Merge comments: deduplicate by id
    const commentMap = {};
    state.comments.forEach(c => { commentMap[c.id] = c; });
    allData.forEach(d => { (d.comments||[]).forEach(c => { commentMap[c.id] = c; }); });
    state.comments = Object.values(commentMap).sort((a,b) => a.createdAt - b.createdAt);

    saveItems(); saveComments();
    renderCards();
    showToast(`✓ Synced from ${files.length} device${files.length!==1?'s':''}`);
  } catch(e) {
    showToast('✗ Sync failed — check connection');
    console.warn('syncFromDrive failed:', e);
  }
}

// ── IMAGE UPLOAD ───────────────────────────────────────────
function triggerFileUpload() {
  if (!gAccessToken) {
    if (!gTokenClient) initGoogleAuth();
    if (!gTokenClient) { alert('Google Sign-In not ready.'); return; }
    gTokenClient.requestAccessToken({ prompt: '' }); return;
  }
  document.getElementById('fileInput').click();
}

function uploadToDrive(input) {
  const file = input.files[0]; if (!file) return;
  if (!gAccessToken) { pendingFile = file; gTokenClient.requestAccessToken({ prompt: '' }); return; }
  doUpload(file);
}

async function doUpload(file) {
  const area = document.getElementById('uploadArea');
  area.classList.add('uploading');
  setUploadStatus('loading', '⏳ Uploading…');
  try {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: file.name, parents: [GDRIVE_FOLDER_ID] })], { type: 'application/json' }));
    form.append('file', file);
    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
      method: 'POST', headers: { Authorization: 'Bearer ' + gAccessToken }, body: form,
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message||'Upload failed'); }
    const data = await resp.json();
    await drivePermission(data.id, { role: 'reader', type: 'anyone' });
    await drivePermission(data.id, { role: 'writer', type: 'user', emailAddress: GDRIVE_OWNER }, '?sendNotificationEmail=false');
    document.getElementById('inputImageUrl').value = `https://drive.google.com/thumbnail?id=${data.id}&sz=w800`;
    doPreview();
    setUploadStatus('success', `✓ "${data.name}" uploaded`);
  } catch(e) {
    setUploadStatus('error', '✗ Upload failed: ' + e.message);
  } finally {
    area.classList.remove('uploading');
    document.getElementById('fileInput').value = '';
  }
}

// ── EXPORT SUMMARY TO DRIVE ────────────────────────────────
async function exportToDrive() {
  if (!gAccessToken) { alert('Please sign in first.'); return; }
  showToast('⏳ Saving summary to Drive…');
  const date = new Date().toISOString().slice(0,10);
  try {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: `Refurb-Summary-${date}.html`, parents: [GDRIVE_FOLDER_ID] })], { type: 'application/json' }));
    form.append('file', new Blob([buildExportHtml()], { type: 'text/html' }));
    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
      method: 'POST', headers: { Authorization: 'Bearer ' + gAccessToken }, body: form,
    });
    if (!resp.ok) throw new Error('Upload failed');
    const data = await resp.json();
    await drivePermission(data.id, { role: 'reader', type: 'anyone' });
    await drivePermission(data.id, { role: 'writer', type: 'user', emailAddress: GDRIVE_OWNER }, '?sendNotificationEmail=false');
    showToast(`✓ Summary saved to Drive`);
  } catch(e) { showToast('✗ Failed: ' + e.message); }
}

// ── AI ANALYSIS EXPORT ─────────────────────────────────────
async function exportAnalysis() {
  const analysisData = buildAnalysisData();
  const json = JSON.stringify(analysisData, null, 2);
  const date = new Date().toISOString().slice(0,10);
  const filename = `Refurb-Analysis-${date}.json`;

  // Save to Drive
  if (gAccessToken) {
    showToast('⏳ Saving analysis data to Drive…');
    try {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [GDRIVE_FOLDER_ID] })], { type: 'application/json' }));
      form.append('file', new Blob([json], { type: 'application/json' }));
      const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST', headers: { Authorization: 'Bearer ' + gAccessToken }, body: form,
      });
      if (!resp.ok) throw new Error();
      const data = await resp.json();
      await drivePermission(data.id, { role: 'reader', type: 'anyone' });
      await drivePermission(data.id, { role: 'writer', type: 'user', emailAddress: GDRIVE_OWNER }, '?sendNotificationEmail=false');
      showToast(`✓ Analysis JSON saved to Drive as "${filename}"`);
    } catch { showToast('✗ Drive save failed — downloading instead'); }
  }

  // Always also download locally
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = filename;
  a.click();
}

// ── HELPERS ────────────────────────────────────────────────
async function drivePermission(fileId, body, qs='') {
  return fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions${qs}`, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function setUploadStatus(type, msg) {
  const el = document.getElementById('uploadStatus');
  el.className = 'upload-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}
