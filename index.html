 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Refurb Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --bg2: #F5F0E8;
    --terracotta: #C4704F;
    --terracotta-dark: #A85C3D;
    --sage: #7D9B76;
    --text: #2C2C2C;
    --muted: #6B6B6B;
    --border: #E0D8CF;
    --white: #FFFFFF;
    --shadow: rgba(44,44,44,0.08);
    --shadow-md: rgba(44,44,44,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  h1, h2, h3, .card-title {
    font-family: 'Playfair Display', serif;
  }

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-brand h1 {
    font-size: 1.25rem;
    color: var(--terracotta);
    letter-spacing: -0.01em;
  }

  .header-brand .brand-icon {
    font-size: 1.4rem;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }

  .btn-primary {
    background: var(--terracotta);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--terracotta-dark); }

  .btn-secondary {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg2); color: var(--text); }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
  }

  .room-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .room-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--muted);
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }

  .room-item:hover {
    background: var(--bg2);
    color: var(--text);
  }

  .room-item.active {
    background: #FDF0EB;
    color: var(--terracotta);
    border-left-color: var(--terracotta);
    font-weight: 600;
  }

  .room-icon { font-size: 1rem; }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-add-room {
    width: 100%;
    justify-content: center;
    background: transparent;
    color: var(--terracotta);
    border: 1.5px dashed var(--terracotta);
    font-size: 0.85rem;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add-room:hover {
    background: #FDF0EB;
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .room-header {
    padding: 24px 28px 0;
  }

  .room-header h2 {
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
    padding: 0 28px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.15s ease;
    border-radius: 6px 6px 0 0;
  }

  .tab:hover { color: var(--text); background: var(--bg2); }

  .tab.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
    background: transparent;
  }

  /* ── GRID AREA ── */
  .grid-area {
    padding: 24px 28px;
    flex: 1;
  }

  .grid-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
  }

  /* ── CARD GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h3 {
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 0.875rem;
    margin-bottom: 20px;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }

  .card:hover {
    box-shadow: 0 6px 20px var(--shadow-md);
    transform: translateY(-2px);
  }

  .card-image-wrap {
    position: relative;
    width: 100%;
    padding-top: 66.66%;
    background: var(--bg2);
    overflow: hidden;
  }

  .card-image-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-image-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--border);
    gap: 6px;
    font-size: 0.75rem;
  }

  .card-image-placeholder svg {
    width: 36px;
    height: 36px;
    opacity: 0.5;
  }

  .colour-bar {
    height: 4px;
    width: 100%;
  }

  .card-body {
    padding: 12px 14px 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    word-break: break-word;
  }

  .card-notes {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }

  .card-footer {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--bg2);
  }

  .vote-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.85rem;
    color: var(--muted);
    padding: 4px 6px;
    border-radius: 6px;
    transition: all 0.15s ease;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }

  .vote-btn:hover { background: #FDF0EB; }

  .vote-btn.voted { color: #E05A5A; }

  .vote-btn .heart-icon {
    font-size: 1rem;
    line-height: 1;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    color: var(--muted);
    transition: all 0.15s ease;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
  }

  .delete-btn:hover { background: #FEF0F0; color: #D04040; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,44,44,0.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(44,44,44,0.25);
    transform: translateY(16px) scale(0.98);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 {
    font-size: 1.15rem;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.3rem;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--bg2); color: var(--text); }

  .modal-body {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .form-group input,
  .form-group textarea {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    width: 100%;
    transition: border-color 0.15s ease;
    outline: none;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--terracotta);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .colour-picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .colour-picker-row input[type="color"] {
    width: 44px;
    height: 36px;
    padding: 2px;
    border-radius: 8px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg);
  }

  .colour-label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* ── IMAGE PREVIEW ── */
  .image-preview {
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg2);
    display: none;
  }

  .image-preview.visible { display: block; }

  .image-preview img {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    display: block;
  }

  .image-preview-error {
    padding: 16px;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    .app-body {
      flex-direction: column;
      height: auto;
      overflow: visible;
    }

    .sidebar {
      width: 100%;
      min-width: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: none;
      overflow: visible;
    }

    .room-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: visible;
      padding: 8px;
      gap: 6px;
      flex-wrap: nowrap;
      scrollbar-width: none;
    }
    .room-list::-webkit-scrollbar { display: none; }

    .room-item {
      white-space: nowrap;
      border-left: none;
      border-bottom: 2px solid transparent;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.82rem;
    }

    .room-item.active {
      background: #FDF0EB;
      border-bottom-color: transparent;
      border-radius: 20px;
    }

    .sidebar-header { display: none; }

    .sidebar-footer {
      display: none;
    }

    .mobile-add-room {
      display: block !important;
    }

    .main { overflow-y: visible; }

    .card-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .room-header { padding: 16px 16px 0; }
    .grid-area { padding: 16px; }
    .tabs { padding: 0 16px; }

    header { padding: 0 16px; }
    .header-brand h1 { font-size: 1rem; }
  }

  .mobile-add-room {
    display: none;
    padding: 4px 8px 8px;
  }

  .mobile-add-room button {
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 16px;
    background: transparent;
    border: 1.5px dashed var(--terracotta);
    color: var(--terracotta);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #C0B8AF; }

  /* ── GOOGLE DRIVE ── */
  .gdrive-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s ease;
  }
  .gdrive-btn:hover { background: var(--bg2); }
  .gdrive-btn.signed-in { border-color: var(--sage); color: var(--sage); }

  .upload-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 0.78rem;
  }
  .upload-divider::before,
  .upload-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--bg);
  }
  .upload-area:hover { border-color: var(--terracotta); background: #FDF8F6; }
  .upload-area.uploading { opacity: 0.6; pointer-events: none; }
  .upload-area p { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }

  .upload-status {
    font-size: 0.82rem;
    padding: 8px 12px;
    border-radius: 8px;
    display: none;
  }
  .upload-status.success { background: #EBF5EB; color: #3A7A3A; display: block; }
  .upload-status.error { background: #FDECEC; color: #A03030; display: block; }
  .upload-status.loading { background: var(--bg2); color: var(--muted); display: block; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="brand-icon">🏡</span>
    <h1>Home Refurb Planner</h1>
  </div>
  <div class="header-actions">
    <button class="gdrive-btn" id="gSignInBtn" onclick="handleGoogleSignIn()" title="Sign in to enable Google Drive image uploads">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="gSignInLabel">Sign in for uploads</span>
    </button>
    <button class="btn btn-ghost" onclick="exportSummary()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Rooms</h2>
    </div>
    <div class="room-list" id="roomList"></div>
    <div class="mobile-add-room">
      <button onclick="addRoom()">+ Add Room</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-add-room" onclick="addRoom()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Room
      </button>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="room-header">
      <h2 id="currentRoomName">Select a room</h2>
    </div>
    <div class="tabs" id="tabsBar"></div>
    <div class="grid-area">
      <div class="grid-toolbar">
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Inspiration
        </button>
      </div>
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </main>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Inspiration</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Google Drive upload -->
      <div id="driveUploadSection">
        <div class="upload-area" id="uploadArea" onclick="triggerFileUpload()">
          <svg width="28" height="28" fill="none" stroke="var(--terracotta)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p id="uploadAreaLabel">Upload image to Google Drive</p>
          <p style="font-size:0.75rem;margin-top:2px;color:var(--border)">Sign in first, then click to choose a file</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadToDrive(this)">
        <div class="upload-status" id="uploadStatus"></div>
      </div>

      <div class="upload-divider">or paste a URL</div>

      <div class="form-group">
        <label for="inputImageUrl">Image URL</label>
        <input type="url" id="inputImageUrl" placeholder="https://..." autocomplete="off"
          oninput="schedulePreview()" onblur="doPreview()">
      </div>
      <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="" alt="Preview">
        <div class="image-preview-error" id="previewError" style="display:none">Could not load image. The URL may not allow hotlinking.</div>
      </div>
      <div class="form-group">
        <label for="inputTitle">Title</label>
        <input type="text" id="inputTitle" placeholder="e.g. Velvet sofa in sage green" maxlength="80">
      </div>
      <div class="form-group">
        <label for="inputNotes">Notes</label>
        <textarea id="inputNotes" placeholder="Add any notes, links, or sizes..."></textarea>
      </div>
      <div class="form-group">
        <label>Colour Tag</label>
        <div class="colour-picker-row">
          <input type="color" id="inputColour" value="#C4704F">
          <span class="colour-label">Pick an accent colour for this card</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const CATEGORIES = ['Colour Schemes', 'Materials', 'Furniture', 'Fittings', 'Other'];

const DEFAULT_ROOMS = [
  { id: 'r-living', name: 'Living Room', isDefault: true },
  { id: 'r-kitchen', name: 'Kitchen', isDefault: true },
  { id: 'r-bedroom', name: 'Bedroom', isDefault: true },
  { id: 'r-bathroom', name: 'Bathroom', isDefault: true },
  { id: 'r-hallway', name: 'Hallway', isDefault: true },
];

const ROOM_ICONS = {
  'Living Room': '🛋️',
  'Kitchen': '🍳',
  'Bedroom': '🛏️',
  'Bathroom': '🚿',
  'Hallway': '🚪',
};

const LS_ROOMS = 'homeRefurbPlanner_rooms';
const LS_ITEMS = 'homeRefurbPlanner_items';
const LS_VOTES = 'homeRefurbPlanner_votes';

// ── STATE ──────────────────────────────────────────────────
let state = {
  rooms: [],
  items: [],
  votes: {},
  activeRoomId: null,
  activeCategory: CATEGORIES[0],
};

// ── LOCAL STORAGE HELPERS ──────────────────────────────────
function loadData() {
  const rooms = JSON.parse(localStorage.getItem(LS_ROOMS) || 'null');
  if (!rooms || rooms.length === 0) {
    state.rooms = DEFAULT_ROOMS.map(r => ({ ...r }));
    saveRooms();
  } else {
    state.rooms = rooms;
  }
  state.items = JSON.parse(localStorage.getItem(LS_ITEMS) || '[]');
  state.votes = JSON.parse(localStorage.getItem(LS_VOTES) || '{}');
}

function saveRooms() {
  localStorage.setItem(LS_ROOMS, JSON.stringify(state.rooms));
}

function saveItems() {
  localStorage.setItem(LS_ITEMS, JSON.stringify(state.items));
}

function saveVotes() {
  localStorage.setItem(LS_VOTES, JSON.stringify(state.votes));
}

// ── UTILITIES ─────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getRoomIcon(name) {
  return ROOM_ICONS[name] || '🏠';
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── RENDER SIDEBAR ─────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  state.rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item' + (room.id === state.activeRoomId ? ' active' : '');
    div.dataset.id = room.id;
    div.innerHTML = `<span class="room-icon">${escHtml(getRoomIcon(room.name))}</span>${escHtml(room.name)}`;
    div.addEventListener('click', () => selectRoom(room.id));
    list.appendChild(div);
  });
}

// ── RENDER TABS ────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === state.activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => selectCategory(cat));
    bar.appendChild(btn);
  });
}

// ── RENDER CARDS ───────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const filtered = state.items.filter(
    item => item.roomId === state.activeRoomId && item.category === state.activeCategory
  );

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✨</div>
        <h3>No inspiration yet</h3>
        <p>Start adding ideas for <strong>${escHtml(state.activeCategory)}</strong> in this room. Paste image URLs, add notes, and vote on your favourites.</p>
        <button class="btn btn-primary" onclick="openAddModal()">
          Add Inspiration
        </button>
      </div>`;
    return;
  }

  filtered.forEach(item => {
    const hasVote = !!state.votes[item.id];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;

    const imageHtml = item.imageUrl
      ? `<img src="${escHtml(item.imageUrl)}" alt="${escHtml(item.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';

    const placeholderStyle = item.imageUrl ? 'style="display:none"' : '';

    card.innerHTML = `
      <div class="card-image-wrap">
        ${imageHtml}
        <div class="card-image-placeholder" ${placeholderStyle}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>No image</span>
        </div>
      </div>
      <div class="colour-bar" style="background:${escHtml(item.colour || '#C4704F')}"></div>
      <div class="card-body">
        <div class="card-title">${escHtml(item.title || 'Untitled')}</div>
        ${item.notes ? `<div class="card-notes">${escHtml(item.notes)}</div>` : ''}
      </div>
      <div class="card-footer">
        <button class="vote-btn${hasVote ? ' voted' : ''}" onclick="toggleVote('${item.id}')" title="${hasVote ? 'Remove vote' : 'Vote for this'}">
          <span class="heart-icon">${hasVote ? '❤️' : '🤍'}</span>
          <span class="vote-count">${item.votes || 0}</span>
        </button>
        <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Delete">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>`;

    grid.appendChild(card);
  });
}

function render() {
  renderSidebar();
  renderTabs();
  renderCards();
  const room = state.rooms.find(r => r.id === state.activeRoomId);
  document.getElementById('currentRoomName').textContent = room ? room.name : 'Select a room';
}

// ── ACTIONS ────────────────────────────────────────────────
function selectRoom(id) {
  state.activeRoomId = id;
  render();
}

function selectCategory(cat) {
  state.activeCategory = cat;
  render();
}

function addRoom() {
  const name = prompt('Enter room name:');
  if (!name || !name.trim()) return;
  const room = { id: uid(), name: name.trim(), isDefault: false };
  state.rooms.push(room);
  saveRooms();
  selectRoom(room.id);
}

function toggleVote(itemId) {
  const item = state.items.find(i => i.id === itemId);
  if (!item) return;
  const hasVote = !!state.votes[itemId];
  if (hasVote) {
    item.votes = Math.max(0, (item.votes || 0) - 1);
    delete state.votes[itemId];
  } else {
    item.votes = (item.votes || 0) + 1;
    state.votes[itemId] = true;
  }
  saveItems();
  saveVotes();

  // Update card in-place for snappy UX
  const card = document.querySelector(`.card[data-id="${itemId}"]`);
  if (card) {
    const btn = card.querySelector('.vote-btn');
    const countEl = card.querySelector('.vote-count');
    const heartEl = card.querySelector('.heart-icon');
    const nowVoted = !!state.votes[itemId];
    btn.classList.toggle('voted', nowVoted);
    heartEl.textContent = nowVoted ? '❤️' : '🤍';
    countEl.textContent = item.votes;
    btn.title = nowVoted ? 'Remove vote' : 'Vote for this';
  }
}

function deleteItem(itemId) {
  if (!confirm('Delete this inspiration card? This cannot be undone.')) return;
  state.items = state.items.filter(i => i.id !== itemId);
  delete state.votes[itemId];
  saveItems();
  saveVotes();
  renderCards();
}

// ── MODAL ──────────────────────────────────────────────────
function openAddModal() {
  if (!state.activeRoomId) {
    alert('Please select a room first.');
    return;
  }
  document.getElementById('inputImageUrl').value = '';
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputNotes').value = '';
  document.getElementById('inputColour').value = '#C4704F';
  document.getElementById('imagePreview').classList.remove('visible');
  document.getElementById('previewImg').src = '';
  document.getElementById('previewError').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputImageUrl').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── IMAGE PREVIEW ──────────────────────────────────────────
let previewTimer = null;

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(doPreview, 600);
}

function doPreview() {
  clearTimeout(previewTimer);
  const url = document.getElementById('inputImageUrl').value.trim();
  const preview = document.getElementById('imagePreview');
  const img = document.getElementById('previewImg');
  const err = document.getElementById('previewError');

  if (!url) {
    preview.classList.remove('visible');
    img.src = '';
    return;
  }

  err.style.display = 'none';
  img.style.display = 'block';
  preview.classList.add('visible');

  img.onload = function() {
    img.style.display = 'block';
    err.style.display = 'none';
  };
  img.onerror = function() {
    img.style.display = 'none';
    err.style.display = 'block';
  };
  img.src = url;
}

function saveItem() {
  const imageUrl = document.getElementById('inputImageUrl').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const notes = document.getElementById('inputNotes').value.trim();
  const colour = document.getElementById('inputColour').value;

  if (!title) {
    document.getElementById('inputTitle').focus();
    document.getElementById('inputTitle').style.borderColor = '#D04040';
    setTimeout(() => document.getElementById('inputTitle').style.borderColor = '', 2000);
    return;
  }

  const item = {
    id: uid(),
    roomId: state.activeRoomId,
    category: state.activeCategory,
    imageUrl,
    title,
    notes,
    colour,
    votes: 0,
    createdAt: Date.now(),
  };

  state.items.push(item);
  saveItems();
  closeModal();
  renderCards();
}

// ── EXPORT ────────────────────────────────────────────────
function exportSummary() {
  const rooms = state.rooms;
  const items = state.items;
  const votes = state.votes;

  let sectionsHtml = '';

  rooms.forEach(room => {
    let roomHasContent = false;
    let categoriesHtml = '';

    CATEGORIES.forEach(cat => {
      const catItems = items
        .filter(i => i.roomId === room.id && i.category === cat)
        .sort((a, b) => (b.votes || 0) - (a.votes || 0));

      if (catItems.length === 0) return;
      roomHasContent = true;

      let cardsHtml = catItems.map(item => {
        const voted = votes[item.id] ? '❤️' : '🤍';
        const imgHtml = item.imageUrl
          ? `<img src="${escHtml(item.imageUrl)}" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:block;margin-bottom:10px" onerror="this.style.display='none'">`
          : '';
        const notesHtml = item.notes ? `<p style="font-size:0.8rem;color:#6B6B6B;margin:4px 0 0;line-height:1.5">${escHtml(item.notes)}</p>` : '';
        return `
          <div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(44,44,44,0.08);break-inside:avoid">
            <div style="border-top:4px solid ${escHtml(item.colour || '#C4704F')}"></div>
            <div style="padding:12px 14px">
              ${imgHtml}
              <div style="font-family:'Playfair Display',serif;font-weight:600;font-size:0.95rem;color:#2C2C2C">${escHtml(item.title || 'Untitled')}</div>
              ${notesHtml}
              <div style="margin-top:8px;font-size:0.82rem;color:#6B6B6B">${voted} ${item.votes || 0} vote${(item.votes || 0) !== 1 ? 's' : ''}</div>
            </div>
          </div>`;
      }).join('');

      categoriesHtml += `
        <div style="margin-bottom:24px">
          <h3 style="font-family:'Inter',sans-serif;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:#6B6B6B;margin:0 0 12px;font-weight:600">${escHtml(cat)}</h3>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
            ${cardsHtml}
          </div>
        </div>`;
    });

    if (!roomHasContent) return;

    sectionsHtml += `
      <section style="margin-bottom:40px;break-inside:avoid-page">
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#C4704F;border-bottom:2px solid #E0D8CF;padding-bottom:10px;margin:0 0 20px">${escHtml(room.name)}</h2>
        ${categoriesHtml}
      </section>`;
  });

  if (!sectionsHtml) {
    sectionsHtml = '<p style="color:#6B6B6B;font-style:italic">No inspiration items saved yet.</p>';
  }

  const exportDate = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home Refurb – Inspiration Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter',sans-serif; background:#FAF8F5; color:#2C2C2C; margin:0; padding:0; }
  .page { max-width:900px; margin:0 auto; padding:40px 32px; }
  @media print {
    body { background:#fff; }
    .no-print { display:none; }
  }
</style>
</head>
<body>
<div class="page">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;padding-bottom:20px;border-bottom:2px solid #E0D8CF">
    <div>
      <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:#C4704F;margin:0 0 6px">Home Refurb Inspiration</h1>
      <p style="color:#6B6B6B;margin:0;font-size:0.9rem">Exported on ${escHtml(exportDate)}</p>
    </div>
    <button class="no-print" onclick="window.print()" style="font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;padding:9px 18px;border-radius:8px;border:none;background:#C4704F;color:#fff;cursor:pointer">Print / Save PDF</button>
  </div>
  ${sectionsHtml}
</div>
</body>
</html>`;

  const win = window.open('', '_blank');
  if (win) {
    win.document.write(html);
    win.document.close();
  } else {
    alert('Pop-up blocked. Please allow pop-ups for this page and try again.');
  }
}

// ── KEYBOARD SHORTCUT ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── INIT ──────────────────────────────────────────────────
loadData();
if (state.rooms.length > 0) {
  state.activeRoomId = state.rooms[0].id;
}
render();
</script>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
// ── GOOGLE DRIVE CONFIG ───────────────────────────────────
const GDRIVE_CLIENT_ID = '403538152707-cpk3r4ucju9pq28d96a2p0nqfvl778jl.apps.googleusercontent.com';
const GDRIVE_FOLDER_ID = '1HaqD9eilBeilQtvNa3ALY70yn7siYOHy';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let gAccessToken = null;
let gTokenClient = null;

function initGoogleAuth() {
  if (!window.google) return;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: (resp) => {
      if (resp.error) {
        setUploadStatus('error', 'Google sign-in failed: ' + resp.error);
        return;
      }
      gAccessToken = resp.access_token;
      updateSignInUI(true);
      // If a file was waiting, trigger it now
      if (pendingFile) {
        doUpload(pendingFile);
        pendingFile = null;
      }
    },
  });
}

// Try init once GIS script loads
window.addEventListener('load', () => setTimeout(initGoogleAuth, 500));

function updateSignInUI(signedIn) {
  const btn = document.getElementById('gSignInBtn');
  const label = document.getElementById('gSignInLabel');
  const uploadArea = document.getElementById('uploadArea');
  if (signedIn) {
    btn.classList.add('signed-in');
    label.textContent = 'Google Drive connected ✓';
    uploadArea.querySelector('p').textContent = 'Click to choose an image file';
  } else {
    btn.classList.remove('signed-in');
    label.textContent = 'Sign in for uploads';
  }
}

function handleGoogleSignIn() {
  if (gAccessToken) {
    // Already signed in — sign out
    google.accounts.oauth2.revoke(gAccessToken, () => {});
    gAccessToken = null;
    updateSignInUI(false);
    return;
  }
  if (!gTokenClient) { initGoogleAuth(); }
  if (!gTokenClient) { alert('Google Sign-In is not ready yet. Please wait a moment and try again.'); return; }
  gTokenClient.requestAccessToken({ prompt: 'consent' });
}

// ── FILE UPLOAD ───────────────────────────────────────────
let pendingFile = null;

function triggerFileUpload() {
  if (!gAccessToken) {
    // Sign in first, then upload
    if (!gTokenClient) initGoogleAuth();
    if (!gTokenClient) { alert('Google Sign-In not ready. Please try again in a moment.'); return; }
    pendingFile = null; // will be set after file chosen
    gTokenClient.requestAccessToken({ prompt: '' });
    // After token comes back, user needs to click again — let's open file picker directly
    // by storing intent
    sessionStorage.setItem('gdrivePendingUpload', '1');
    return;
  }
  document.getElementById('fileInput').click();
}

function uploadToDrive(input) {
  const file = input.files[0];
  if (!file) return;
  if (!gAccessToken) {
    pendingFile = file;
    gTokenClient.requestAccessToken({ prompt: '' });
    return;
  }
  doUpload(file);
}

async function doUpload(file) {
  const area = document.getElementById('uploadArea');
  area.classList.add('uploading');
  setUploadStatus('loading', '⏳ Uploading to Google Drive…');

  try {
    // 1. Upload file via multipart
    const metadata = {
      name: file.name,
      parents: [GDRIVE_FOLDER_ID],
    };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);

    const uploadResp = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
      {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + gAccessToken },
        body: form,
      }
    );

    if (!uploadResp.ok) {
      const err = await uploadResp.json();
      throw new Error(err.error?.message || 'Upload failed');
    }

    const fileData = await uploadResp.json();
    const fileId = fileData.id;

    // 2. Make file publicly readable
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'reader', type: 'anyone' }),
    });

    // 3. Share with the folder owner so it appears in their Drive
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?sendNotificationEmail=false`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'writer', type: 'user', emailAddress: 'cachafpm@gmail.com' }),
    });

    // 4. Build public image URL and populate the URL field
    const imageUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
    document.getElementById('inputImageUrl').value = imageUrl;
    doPreview();

    setUploadStatus('success', `✓ "${fileData.name}" uploaded to Google Drive`);
  } catch (e) {
    setUploadStatus('error', '✗ Upload failed: ' + e.message);
  } finally {
    area.classList.remove('uploading');
    document.getElementById('fileInput').value = '';
  }
}

function setUploadStatus(type, msg) {
  const el = document.getElementById('uploadStatus');
  el.className = 'upload-status ' + type;
  el.textContent = msg;
}

// Reset upload status when modal opens
const _origOpenAddModal = openAddModal;
window.openAddModal = function() {
  _origOpenAddModal();
  setUploadStatus('', '');
  document.getElementById('uploadStatus').className = 'upload-status';
};
</script>
</body>
</html>
